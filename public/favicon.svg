<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="7" fill="#0f766e"/>
  <!-- Pillar -->
  <line x1="16" y1="6.5" x2="16" y2="24" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Tilted beam (left side heavier = hold wins) -->
  <line x1="5.5" y1="13.5" x2="26.5" y2="10.5" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Left pan (lower = heavier = the answer) -->
  <path d="M5.5 13.5l1.5 5.5h6l1.5-5.5" stroke="white" stroke-width="1.4" stroke-linejoin="round" fill="white" fill-opacity="0.2"/>
  <!-- Right pan (higher = lighter) -->
  <path d="M19 10.5l1.5 5.5h6l1.5-5.5" stroke="white" stroke-width="1.4" stroke-linejoin="round" fill="white" fill-opacity="0.1"/>
  <!-- Base -->
  <line x1="11" y1="24" x2="21" y2="24" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Fulcrum triangle -->
  <path d="M14 24l2-3 2 3" fill="white"/>
</svg>
